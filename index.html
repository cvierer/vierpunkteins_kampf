<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Initiative Tracker</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 15px;
            background-color: #242424;
            color: white;
            margin: 0;
        }
        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        input {
            padding: 5px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #333;
            color: white;
        }
        input[type="number"] {
            width: 60px;
        }
        button {
            padding: 6px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .next-btn {
            width: 100%;
            background-color: #008CBA;
            margin-bottom: 15px;
        }
        .next-btn:hover {
            background-color: #007B9E;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 10px;
            background: #333;
            margin-bottom: 5px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Das ist die Markierung für den Spieler, der dran ist */
        .active-turn {
            background: #d4af37; /* Gold */
            color: black;
            font-weight: bold;
            border: 2px solid white;
        }
        .delete-btn {
            background: #f44336;
            padding: 2px 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    
    <div class="input-group">
        <input type="text" id="nameInput" placeholder="Name (z.B. Goblin)">
        <input type="number" id="initInput" placeholder="Init">
        <button id="addBtn">Hinzufügen</button>
    </div>

    <button id="nextBtn" class="next-btn">Nächster Zug</button>

    <ul id="trackerList">
        </ul>

    <script type="module">
        import OBR from "https://owlbear.rodeo/sdk";

        let actors = [];
        let currentTurnIndex = 0;

        // HTML-Elemente abrufen
        const nameInput = document.getElementById("nameInput");
        const initInput = document.getElementById("initInput");
        const addBtn = document.getElementById("addBtn");
        const nextBtn = document.getElementById("nextBtn");
        const trackerList = document.getElementById("trackerList");

        // Funktion: Charakter hinzufügen
        function addActor() {
            const name = nameInput.value.trim();
            const init = parseInt(initInput.value);

            if (name === "" || isNaN(init)) return; // Abbrechen, wenn Felder leer sind

            // Neuen Charakter zum Array hinzufügen
            actors.push({ name: name, init: init });
            
            // Liste absteigend sortieren (Höchste Initiative zuerst)
            actors.sort((a, b) => b.init - a.init);
            
            // Eingabefelder leeren
            nameInput.value = "";
            initInput.value = "";

            renderList();
        }

        // Funktion: Nächster Zug
        function nextTurn() {
            if (actors.length === 0) return;
            // Erhöht den Index. Wenn das Ende der Liste erreicht ist, fängt es bei 0 wieder an.
            currentTurnIndex = (currentTurnIndex + 1) % actors.length;
            renderList();
        }

        // Funktion: Einen Charakter entfernen
        function removeActor(indexToRemove) {
            actors.splice(indexToRemove, 1);
            // Wenn der aktive Spieler gelöscht wurde, passe den Index an
            if (currentTurnIndex >= actors.length) {
                currentTurnIndex = 0;
            }
            renderList();
        }

        // Funktion: Die Liste auf dem Bildschirm zeichnen
        function renderList() {
            trackerList.innerHTML = ""; // Alte Liste löschen

            actors.forEach((actor, index) => {
                const li = document.createElement("li");
                
                // Wenn dieser Charakter dran ist, gib ihm die CSS-Klasse "active-turn"
                if (index === currentTurnIndex) {
                    li.classList.add("active-turn");
                }

                // Text für Name und Initiative
                const textSpan = document.createElement("span");
                textSpan.innerText = `${actor.name} (Init: ${actor.init})`;
                
                // Löschen-Button für jeden Eintrag
                const deleteBtn = document.createElement("button");
                deleteBtn.innerText = "X";
                deleteBtn.classList.add("delete-btn");
                deleteBtn.onclick = () => removeActor(index);

                li.appendChild(textSpan);
                li.appendChild(deleteBtn);
                trackerList.appendChild(li);
            });
        }

        // Event-Listener an die Buttons binden
        addBtn.addEventListener("click", addActor);
        nextBtn.addEventListener("click", nextTurn);

        // Auch mit "Enter" im Initiative-Feld hinzufügen
        initInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") addActor();
        });

        // Owlbear Rodeo Initialisierung
        OBR.onReady(() => {
            console.log("Initiative Tracker bereit!");
        });
    </script>
</body>
</html>
