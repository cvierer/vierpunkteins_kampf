<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #242424; color: white; padding: 15px; margin: 0; }
        h2 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 5px; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { background: #333; margin-bottom: 5px; padding: 10px; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>Initiative Liste</h2>
    <ul id="initiative-list"></ul>

    <script type="module">
        import OBR from "https://owlbear.rodeo/sdk";

        const METADATA_ID = "cvierer/initiative";
        const listElement = document.getElementById("initiative-list");

        // Zeichnet die Liste neu
        function renderList(items) {
            const initiativeItems = [];
            
            for (const item of items) {
                const metadata = item.metadata[METADATA_ID];
                if (metadata) {
                    initiativeItems.push({
                        initiative: metadata.initiative,
                        name: item.name || "Unbekannt"
                    });
                }
            }

            // Höchste Zahl nach oben sortieren
            initiativeItems.sort((a, b) => b.initiative - a.initiative);

            // Altes HTML löschen und Token als Liste einfügen
            listElement.innerHTML = "";
            for (const initItem of initiativeItems) {
                const li = document.createElement("li");
                li.innerHTML = `<strong>${initItem.name}</strong> - Init: ${initItem.initiative}`;
                listElement.appendChild(li);
            }
        }

        OBR.onReady(async () => {
            // Beim Starten alle Token von der Karte scannen
            const items = await OBR.scene.items.getItems();
            renderList(items);

            // Wartet im Hintergrund: Sobald du per Rechtsklick jemandem eine Initiative gibst,
            // aktualisiert sich diese Liste hier vollautomatisch in Echtzeit!
            OBR.scene.items.onChange((items) => {
                renderList(items);
            });
        });
    </script>
</body>
</html>
