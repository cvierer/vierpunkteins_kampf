<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #242424; color: white; padding: 15px; margin: 0; }
        h2 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 5px; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { background: #333; margin-bottom: 5px; padding: 10px; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>Initiative Liste</h2>
    <ul id="initiative-list"></ul>

    <script type="module">
        import OBR from "https://owlbear.rodeo/sdk";

        // Die exakte ID aus dem offiziellen Tutorial
        const ID = "com.tutorial.initiative-tracker";
        const ICON_URL = "https://cvierer.github.io/dsa-owlbear/icon.svg";

        // 1. Kontext-Menü Funktion aus contextMenu.js
        function setupContextMenu() {
            OBR.contextMenu.create({
                id: `${ID}/context-menu`,
                icons: [
                    {
                        icon: ICON_URL,
                        label: "Zur Initiative hinzufügen",
                        filter: {
                            every: [
                                { key: "layer", value: "CHARACTER" },
                                { key: ["metadata", `${ID}/metadata`], value: undefined }
                            ]
                        }
                    },
                    {
                        icon: ICON_URL,
                        label: "Von Initiative entfernen",
                        filter: {
                            every: [{ key: "layer", value: "CHARACTER" }]
                        }
                    }
                ],
                onClick(context) {
                    const addToInitiative = context.items.every(
                        (item) => item.metadata[`${ID}/metadata`] === undefined
                    );

                    if (addToInitiative) {
                        const initiative = window.prompt("Initiative eingeben:");
                        if (initiative === null) return;
                        
                        OBR.scene.items.updateItems(context.items, (items) => {
                            for (let item of items) {
                                item.metadata[`${ID}/metadata`] = { initiative: parseInt(initiative) || 0 };
                            }
                        });
                    } else {
                        OBR.scene.items.updateItems(context.items, (items) => {
                            for (let item of items) {
                                delete item.metadata[`${ID}/metadata`];
                            }
                        });
                    }
                }
            });
        }

        // 2. Listen Funktion aus initiativeList.js
        function setupInitiativeList(element) {
            const renderList = (items) => {
                const initiativeItems = [];
                for (const item of items) {
                    const metadata = item.metadata[`${ID}/metadata`];
                    if (metadata) {
                        initiativeItems.push({
                            initiative: metadata.initiative,
                            name: item.name || "Unbenannt",
                        });
                    }
                }

                // Sortieren (Höchste Zahl oben)
                const sortedItems = initiativeItems.sort(
                    (a, b) => parseFloat(b.initiative) - parseFloat(a.initiative)
                );

                const nodes = [];
                for (const initiativeItem of sortedItems) {
                    const node = document.createElement("li");
                    node.innerHTML = `<strong>${initiativeItem.name}</strong> (${initiativeItem.initiative})`;
                    nodes.push(node);
                }
                element.replaceChildren(...nodes);
            };

            OBR.scene.items.getItems().then(renderList);
            OBR.scene.items.onChange(renderList);
        }

        // 3. Start-Funktion aus main.js
        OBR.onReady(() => {
            setupContextMenu();
            setupInitiativeList(document.querySelector("#initiative-list"));
        });
    </script>
</body>
</html>
