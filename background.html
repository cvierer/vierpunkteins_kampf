<!DOCTYPE html>
<html lang="de">
<head>
    <script type="module">
        import OBR from "https://owlbear.rodeo/sdk";

        const METADATA_ID = "cvierer/initiative";
        // Hier ist der feste Link zu deinem Icon!
        const ICON_URL = "https://cvierer.github.io/dsa-owlbear/icon.svg";

        OBR.onReady(() => {
            OBR.contextMenu.create({
                id: `${METADATA_ID}-menu`,
                icons: [
                    {
                        icon: ICON_URL, 
                        label: "Zur Initiative hinzufügen",
                        filter: {
                            every: [
                                { key: "layer", value: "CHARACTER" },
                                { key: ["metadata", METADATA_ID], value: undefined }
                            ]
                        }
                    },
                    {
                        icon: ICON_URL, 
                        label: "Von Initiative entfernen",
                        filter: {
                            every: [
                                { key: "layer", value: "CHARACTER" }
                            ]
                        }
                    }
                ],
                onClick: async (context) => {
                    const addToInitiative = context.items.every(
                        (item) => item.metadata[METADATA_ID] === undefined
                    );

                    if (addToInitiative) {
                        const initiative = window.prompt("Würfle Initiative (Wert eingeben):");
                        if (initiative === null) return; 
                        
                        await OBR.scene.items.updateItems(context.items, (items) => {
                            for (let item of items) {
                                item.metadata[METADATA_ID] = { initiative: parseInt(initiative) || 0 };
                            }
                        });
                    } else {
                        await OBR.scene.items.updateItems(context.items, (items) => {
                            for (let item of items) {
                                delete item.metadata[METADATA_ID];
                            }
                        });
                    }
                }
            });
        });
    </script>
</head>
<body></body>
</html>
